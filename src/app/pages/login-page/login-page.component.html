<div class="flex justify-center items-center min-h-full h-screen">
  <div class="flex justify-between gap-12 max-w-180 mx-auto w-full items-center">
    <form class="w-full" [formGroup]="form" (ngSubmit)="onSubmit()">
      <h1 class="main-title mb-15">Login</h1>

      <div class="mb-4">
        <label for="email" class="block mb-2 font-bold text-xs">Telegram username</label>
        <input
          formControlName="username"
          class="border border-dark focus:border-light rounded-xs py-3 px-5 bg-dark w-full text-sm font-1"
          type="text"
          name="email"
          id="email"
          autocomplete="username"
          placeholder="Enter login"
        />
      </div>

      <div class="relative svg-color">
        <label class="block mb-2 font-bold text-xs" for="password">Password</label>
        <input
          formControlName="password"
          class="border border-dark focus:border-light rounded-xs py-3 px-5 bg-dark w-full text-sm font-1"
          [type]="isPasswordVisible() ? 'text' : 'password'"
          name="password"
          id="password"
          autocomplete="current-password"
          placeholder="Enter password"
        />
        <button
          (click)="togglePasswordVisibility()"
          class="absolute top-[50%] right-3 z-10 w-6 h-6 cursor-pointer svg-color"
          [class.text-white]="isPasswordVisible()"
          [class.text-gray-600]="!isPasswordVisible()"
        >
          <app-eye [active]="isPasswordVisible()" />
        </button>
      </div>
      <button class="btn btn--shadow mt-8 w-full">Enter</button>
    </form>
    <img src="/img/tik-talk.png" alt="logo" width="300" />
  </div>
</div>
